<script>
  // Menambahkan event listener ke form login saat DOM sudah dimuat
  document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const alertMessage = document.getElementById('alertMessage');

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault(); // Mencegah submit form secara default (reload halaman)

      const username = usernameInput.value;
      const password = passwordInput.value;

      // Reset tampilan alert sebelumnya
      alertMessage.style.display = 'none';
      alertMessage.textContent = '';
      alertMessage.classList.remove('alert-success', 'alert-danger');

      // Panggil fungsi sisi server 'processLogin' melalui google.script.run
      google.script.run
        .withSuccessHandler(function(response) {
          // Callback jika panggilan server berhasil
          alertMessage.textContent = response.message;
          if (response.success) {
            alertMessage.classList.add('alert-success');
            // Jika login berhasil, redirect ke homepage
            window.location.href = response.redirectUrl;
          } else {
            alertMessage.classList.add('alert-danger');
            console.log("Login Gagal: " + response.message);
          }
          alertMessage.style.display = 'block'; // Tampilkan pesan
        })
        .withFailureHandler(function(error) {
          // Callback jika ada kesalahan saat panggilan server
          alertMessage.textContent = 'Terjadi kesalahan sistem: ' + error.message;
          alertMessage.classList.add('alert-danger');
          alertMessage.style.display = 'block'; // Tampilkan pesan error
          console.error('Error saat login:', error);
        })
        .processLogin(username, password); // Kirim username dan password ke server
    });
  });
</script>
