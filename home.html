      z-index: 10;
    }
    .icon-circle {
      width: 80px;

      background: var(--kemenag-green);
      color: white;

      align-items: center;
      justify-content: center;

    }
    .section-header {

    }
    .section-header h2 {
      font-weight: 700;
      color: #333;
      position: relative;
      display: inline-block;
    }
    .section-header h2::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -10px;
      width: 60px;
      height: 4px;
      background-color: #0d6efd;
      border-radius: 2px;
    }
    .feature-item {
      background: white;
      border-radius: 15px;
      box-shadow: var(--card-shadow);

      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      height: 100%;
    }
    .feature-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.15);
    }
    .feature-icon {
      font-size: 3rem;
      color: #0d6efd;
      margin-bottom: 15px;
    }
    .card-profile {
      background: white;
      border-radius: 15px;
      box-shadow: var(--card-shadow);
      margin-bottom: 30px;
      overflow: hidden;
    }
    .card-profile .card-header {
      background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .card-profile .card-body {
      padding: 25px;
    }
    .card-profile .card-title {
      color: #0d6efd;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .btn-profile {
      background: linear-gradient(45deg, #0d6efd, #6610f2);
      border: none;
      padding: 10px 25px;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s;
      color: white;
      text-decoration: none;
    }
    .btn-profile:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
    }
  </style>
</head>
