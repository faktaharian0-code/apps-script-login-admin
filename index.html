<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Login Admin</title>

  <!-- Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

  <style>
    /* Custom CSS untuk tampilan yang sesuai gambar */
    body {
      background-color: #33691E; /* Warna latar belakang abu-abu terang */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh; /* Tinggi minimal 100% viewport */
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 400px; /* Lebar maksimum kartu login */
      padding: 30px;
      border-radius: 15px; /* Sudut membulat */
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); /* Bayangan lembut */
      background-color: #fff; /* Latar belakang kartu putih */
      text-align: center;
    }
    .logo {
      width: 90px; /* Ukuran logo */
      height: auto;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 18px; /* Jarak antar grup form */
      text-align: left;
    }
    .form-control {
      border-radius: 8px; /* Sudut membulat untuk input */
      padding: 12px 15px;
      border: 1px solid #ced4da;
    }
    .form-control:focus {
      border-color: #86b7fe;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }
    .btn-primary {
      width: 100%;
      border-radius: 8px;
      padding: 12px 15px;
      background-color: #0d6efd; /* Warna biru Bootstrap primary */
      border-color: #0d6efd;
      font-weight: bold;
      transition: background-color 0.2s ease-in-out, border-color 0.2s ease-in-out;
    }
    .btn-primary:hover {
      background-color: #0b5ed7;
      border-color: #0a58ca;
    }
    .alert {
      margin-top: 25px;
      padding: 15px;
      border-radius: 8px;
      font-size: 0.95rem;
      text-align: left;
      display: none; /* Sembunyikan secara default */
    }
    .alert-danger {
      background-color: #f8d7da;
      color: #842029;
      border-color: #f5c2c7;
    }
    .alert-success {
      background-color: #d1e7dd;
      color: #0f5132;
      border-color: #badbcc;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <!-- Logo Kementerian Agama, ganti URL dengan logo Anda jika berbeda -->
    <img src="https://i.ibb.co.com/S4Qj0rXt/Kementerian-Agama-new-logo.png" alt="Logo Kementerian Agama" class="logo">
    
    <h4 class="mb-2">Login Admin</h4>
    <p class="text-muted mb-4">Bimbingan Masyarakat Kristen Kemenag Pegaf</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="username" class="form-label visually-hidden">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password" class="form-label visually-hidden">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary mt-3">Login</button>
      
      <!-- Area untuk menampilkan pesan sukses/error -->
      <div id="alertMessage" class="alert" role="alert"></div>
    </form>
  </div>

  <!-- Bootstrap 5 JS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigF/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

  <!-- Memanggil file JavaScript sisi klien (script.html) -->
  <?!= include('script'); ?>
</body>
</html>
